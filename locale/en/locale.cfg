[mod-setting-description]
exteros-qol-even-distribution-enabled=Enables even distribution of items when using Ctrl + Mouse.
exteros-qol-debug=Shows detailed technical logs in the console.
exteros-qol-squeak-through-enabled=Allows the player to walk between buildings, pipes, and trees by slightly shrinking collision boxes.
exteros-qol-cheat-mode-enabled=Enables additional cheat settings (reach, speed, etc.). Must be ON to use any cheats.
exteros-qol-auto-deconstruct-enabled=Automatically marks mining drills for deconstruction when they run out of resources.
exteros-qol-inventory-repair-enabled=Automatically repairs items in your inventory using repair packs.
exteros-qol-time-controls-enabled=Adds buttons to the top left to control game speed.
exteros-qol-auto-alt-enabled=Automatically enables Alt mode (entity info overlays) when joining a game.
exteros-qol-cheat-productivity-unlocked=Allows using productivity modules in ALL recipes. (Requires Cheat Mode)
exteros-qol-cheat-productivity-cap=Sets the maximum productivity percentage for recipes. (Requires Cheat Mode)
exteros-qol-cheat-stack-size-mode=Choose whether to multiply original stack sizes or set an absolute value. (Requires Cheat Mode)
exteros-qol-cheat-stack-size-value=The multiplier or absolute value for stack sizes. (Requires Cheat Mode)
even-distribution-ticks=How long (in ticks) the mod waits after the last click before distributing items. (60 = 1 second)
even-distribution-swap-balance=If enabled, Ctrl+M1 will be Balanced mode and Ctrl+M2 will be Even mode.
cheat-reach-distance=Increases the distance for building, reaching items, and looting.
cheat-crafting-speed=Increases the manual crafting speed of the player.
cheat-mining-speed=Increases the manual mining speed of the player.
cheat-inventory-bonus=Adds extra slots to the player's inventory.
exteros-qol-inventory-repair-interval=How often (in ticks) the mod checks your inventory and performs a "tick" of repair.
exteros-qol-inventory-repair-order=Choose whether to use the weakest or strongest repair packs first.

[exteros-qol-gui]
speed-up=Double the game speed
speed-down=Halve the game speed
speed-reset=Reset the game speed to 1
