exteros-qol-inventory-repair-order=Priorita opravných sad

[mod-setting-description]
exteros-qol-even-distribution-enabled=Povolí rovnoměrné rozdělování předmětů při použití Ctrl + Klik.
exteros-qol-debug=Zobrazuje detailní technické logy v konzoli.
exteros-qol-squeak-through-enabled=Umožňuje hráči procházet mezi budovami, potrubím a stromy díky mírnému zmenšení kolizních boxů.
exteros-qol-cheat-mode-enabled=Povolí doplňková nastavení pro cheaty (dosah, rychlost atd.). Musí být ZAPNUTO pro použití jakýchkoliv cheatů.
exteros-qol-auto-deconstruct-enabled=Automaticky označí těžaře (minery) k dekonstrukci, jakmile vytěží veškerou rudu.
exteros-qol-inventory-repair-enabled=Automaticky opravuje předměty ve vašem inventáři pomocí opravných sad.
exteros-qol-time-controls-enabled=Přidá tlačítka do horního levého rohu pro ovládání rychlosti hry.
exteros-qol-cheat-productivity-unlocked=Umožňuje použít produktivity moduly ve VŠECH receptech. (Vyžaduje Cheat Mód)
exteros-qol-cheat-productivity-cap=Nastavuje maximální procento produktivity pro recepty. (Vyžaduje Cheat Mód)
exteros-qol-cheat-stack-size-mode=Zvolte, zda chcete násobit původní velikosti stacků nebo nastavit absolutní hodnotu. (Vyžaduje Cheat Mód)
exteros-qol-cheat-stack-size-value=Násobitel nebo absolutní hodnota pro velikost stacků. (Vyžaduje Cheat Mód)
even-distribution-ticks=Doba (v ticích), po kterou mod čeká od posledního kliknutí, než rozdělí předměty. (60 = 1 sekunda)
even-distribution-swap-balance=Pokud je povoleno, Ctrl+M1 bude režim Balancování a Ctrl+M2 bude režim Rovnoměrný.
cheat-reach-distance=Zvyšuje vzdálenost pro stavění, braní předmětů a lootování.
cheat-crafting-speed=Zvyšuje rychlost ruční výroby hráče.
cheat-mining-speed=Zvyšuje rychlost ruční těžby hráče.
cheat-inventory-bonus=Přidá extra sloty do inventáře hráče.
exteros-qol-inventory-repair-interval=Jak často (v ticích) mod kontroluje inventář a provede jeden krok opravy.
exteros-qol-inventory-repair-order=Zvolte, zda se mají nejdříve použít nejslabší nebo nejsilnější opravné sady.

[exteros-qol-gui]
speed-up=Zdvojnásobit rychlost
speed-down=Zpomalit na polovinu
speed-reset=Obnovit rychlost na 1
