exteros-qol-even-distribution-enabled=Povolit Even Distribution
exteros-qol-debug=Debug Mód
exteros-qol-squeak-through-enabled=Povolit Squeak Through
exteros-qol-cheat-mode-enabled=Povolit Cheat Mode
exteros-qol-auto-deconstruct-enabled=Povolit Auto-Deconstruct
exteros-qol-inventory-repair-enabled=Povolit Opravu Inventáře
exteros-qol-time-controls-enabled=Povolit Ovládání Času
exteros-qol-cheat-productivity-unlocked=(Cheat) Odemknout Produktivitu
exteros-qol-cheat-productivity-cap=(Cheat) Limit Produktivity (%)
exteros-qol-cheat-stack-size-mode=(Cheat) Režim velikosti stacků
exteros-qol-cheat-stack-size-value=(Cheat) Hodnota velikosti stacků
even-distribution-ticks=Zpoždění distribuce (Ticků)
even-distribution-swap-balance=Prohodit chování M1 a M2
cheat-reach-distance=(Cheat) Bonus k dosahu (Reach)
cheat-crafting-speed=(Cheat) Bonus k rychlosti výroby
cheat-mining-speed=(Cheat) Bonus k rychlosti těžby
