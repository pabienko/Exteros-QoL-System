[mod-name]
Exteros-QoL-System=Exterosův QoL systém

[mod-description]
Exteros-QoL-System=Modulární balíček QoL: Even Distribution, Squeak Through, Auto Deconstruct a další. Prostě vše, co potřebujete, na jednom místě.

[controls]
exteros-qol-open-hub=Otevřít Exteros QoL Hub

